name: Build & Release SmartMacroAI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [win-x64, win-x86]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore -r ${{ matrix.runtime }}

      - name: Publish standalone EXE
        shell: pwsh
        run: |
          dotnet publish SmartMacroAI.csproj `
            -c Release `
            -r ${{ matrix.runtime }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -o "publish_${{ matrix.runtime }}"

      - name: Clean .pdb files
        shell: pwsh
        run: |
          Get-ChildItem "publish_${{ matrix.runtime }}" -Recurse -Filter "*.pdb" -EA SilentlyContinue | Remove-Item -Force

      - name: Create ZIP
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "SmartMacroAI-$version-${{ matrix.runtime }}.zip"
          Compress-Archive -Path "publish_${{ matrix.runtime }}\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Setup Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $runtime = "${{ matrix.runtime }}"

          $iss = @"
          [Setup]
          AppName=SmartMacroAI
          AppVersion=$version
          AppPublisher=Pham Duy
          AppPublisherURL=https://github.com/${{ github.repository }}
          DefaultDirName={autopf}\SmartMacroAI
          DefaultGroupName=SmartMacroAI
          OutputDir=installer_output
          OutputBaseFilename=SmartMacroAI-$version-$runtime-Setup
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=$( if ($runtime -eq 'win-x64') {'x64compatible'} else {'x86compatible'} )
          ArchitecturesInstallIn64BitMode=x64compatible
          MinVersion=10.0
          PrivilegesRequired=admin

          [Files]
          Source: "publish_$runtime\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Tasks]
          Name: "desktopicon"; Description: "Create desktop shortcut"; GroupDescription: "Additional icons:"; Flags: unchecked

          [Icons]
          Name: "{group}\SmartMacroAI"; Filename: "{app}\SmartMacroAI.exe"
          Name: "{autodesktop}\SmartMacroAI"; Filename: "{app}\SmartMacroAI.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\SmartMacroAI.exe"; Description: "Launch SmartMacroAI"; Flags: nowait postinstall skipifsilent shellexec
          "@

          New-Item -ItemType Directory -Force -Path "installer_output" | Out-Null
          $iss | Out-File -FilePath "setup_$runtime.iss" -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "setup_$runtime.iss"

          $setupFile = "installer_output\SmartMacroAI-$version-$runtime-Setup.exe"
          echo "SETUP_FILE=$setupFile" >> $env:GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_NAME }}
            ${{ env.SETUP_FILE }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
