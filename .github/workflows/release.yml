# SmartMacroAI - Build & Release
# Trigger: push tag v* (e.g. v1.5.6)
# Produces: ZIP (portable), EXE (standalone), Setup EXE (installer)
#
# Created by Pham Duy - Giai phap tu dong hoa thong minh.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish portable (ZIP)
        run: dotnet publish SmartMacroAI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Publish standalone EXE
        run: dotnet publish SmartMacroAI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish_singlefile

      - name: Clean .pdb
        shell: pwsh
        run: |
          Get-ChildItem publish publish_singlefile -Recurse -Filter "*.pdb" -EA SilentlyContinue | Remove-Item -Force

      - name: Create ZIP
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          $zip = "SmartMacroAI-v${v}-win-x64.zip"
          Compress-Archive -Path "publish/*" -DestinationPath $zip
          echo "ZIP_NAME=$zip" >> $env:GITHUB_ENV

      - name: Copy standalone EXE
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          Copy-Item "publish_singlefile/SmartMacroAI.exe" "SmartMacroAI-v${v}-win-x64.exe"
          echo "EXE_NAME=SmartMacroAI-v${v}-win-x64.exe" >> $env:GITHUB_ENV

      - name: Setup Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Installer
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v',''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer/SmartMacroAI_Setup.iss" "/DMyAppVersion=$v"
          Copy-Item "installer_out/SmartMacroAI_Setup_v${v}.exe" "SmartMacroAI_Setup_v${v}.exe"
          echo "SETUP_NAME=SmartMacroAI_Setup_v${v}.exe" >> $env:GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: |
            ${{ env.ZIP_NAME }}
            ${{ env.EXE_NAME }}
            ${{ env.SETUP_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/SmartMacroAI-*.zip
            artifacts/SmartMacroAI-v*.exe
            artifacts/SmartMacroAI_Setup_*.exe
